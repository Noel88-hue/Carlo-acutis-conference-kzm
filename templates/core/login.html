{% extends 'core/base.html' %}
{% load static %}
{% block title %}Admin Login — Kizhakkambalam Conference{% endblock %}
{% block full_content %}
<main style="min-height:calc(100vh - 66px); display:flex; align-items:center; background:linear-gradient(135deg, var(--navy), var(--navy-mid));">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card-custom p-5 anim-fade-up" style="border-radius:18px;">
          <div class="text-center mb-4">
            <img src="{% static 'images/logo.png' %}" alt="SSVP Youth Wing logo" style="width:64px; height:64px; object-fit:contain; margin:0 auto 1rem; display:block;">
            <h3 style="font-family:'Playfair Display',serif; color:var(--navy);">Admin Sign In</h3>
            <p class="text-muted small">Manage programs, events, funds & reports</p>
          </div>
          <form method="post">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label">Username</label>
              <input type="text" name="username" class="form-control" required autofocus>
            </div>
            <div class="mb-3">
              <label class="form-label">Password</label>
              <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn-gold w-100">Sign In</button>
          </form>
          <div class="text-center mt-3">
            <a href="{% url 'home' %}" class="small text-muted text-decoration-none"><i class="fas fa-arrow-left me-1"></i>Back to site</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>
{% endblock %}
