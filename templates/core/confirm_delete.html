{% extends 'core/base.html' %}
{% block title %}Confirm Delete{% endblock %}
{% block content %}
<section class="container py-5" style="min-height:60vh; display:flex; align-items:center;">
  <div class="form-card text-center anim-fade-up">
    <div style="font-size:2.5rem; color:#DC2626;"><i class="fas fa-triangle-exclamation"></i></div>
    <h4 class="mt-3" style="font-family:'Playfair Display',serif;">Delete this {{ type }}?</h4>
    <p class="text-muted">"{{ obj }}" will be permanently removed. This cannot be undone.</p>
    <form method="post" class="d-flex gap-2 justify-content-center mt-3">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger px-4">Yes, Delete</button>
      <a href="javascript:history.back()" class="btn btn-outline-secondary px-4">Cancel</a>
    </form>
  </div>
</section>
{% endblock %}
