<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="haloGlow" cx="50%" cy="32%" r="40%">
      <stop offset="0%" stop-color="#E8D08A" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#C9A84C" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="figureGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A2F4A"/>
      <stop offset="100%" stop-color="#0E1B2E"/>
    </linearGradient>
  </defs>

  <!-- Halo -->
  <circle cx="200" cy="150" r="100" fill="url(#haloGlow)"/>
  <circle cx="200" cy="120" r="58" fill="none" stroke="#C9A84C" stroke-width="2.5" opacity="0.65"/>
  <circle cx="200" cy="120" r="58" fill="none" stroke="#E8D08A" stroke-width="1" opacity="0.4"/>

  <!-- Head silhouette -->
  <ellipse cx="200" cy="128" rx="38" ry="44" fill="url(#figureGrad)"/>
  <!-- simple hair shape -->
  <path d="M162 110 Q165 78 200 76 Q235 78 238 110 Q238 95 200 92 Q162 95 162 110 Z" fill="#0E1B2E"/>

  <!-- Shoulders / torso, youthful silhouette in casual collared top -->
  <path d="M120 320
           Q124 230 175 196
           L180 188
           Q200 198 220 188
           L225 196
           Q276 230 280 320
           L280 420
           Q200 440 120 420
           Z"
        fill="url(#figureGrad)"/>

  <!-- collar detail -->
  <path d="M180 188 L200 214 L220 188" fill="none" stroke="#E8D08A" stroke-width="2" opacity="0.5"/>

  <!-- laptop suggestion at base, nod to "God's influencer" -->
  <g opacity="0.85">
    <rect x="150" y="410" width="100" height="62" rx="4" fill="#1A2F4A" stroke="#C9A84C" stroke-width="1.5"/>
    <rect x="158" y="418" width="84" height="46" rx="2" fill="#0E1B2E"/>
    <rect x="140" y="470" width="120" height="8" rx="2" fill="#1A2F4A"/>
    <!-- small cross glowing on screen -->
    <line x1="200" y1="430" x2="200" y2="452" stroke="#E8D08A" stroke-width="2.5"/>
    <line x1="191" y1="437" x2="209" y2="437" stroke="#E8D08A" stroke-width="2.5"/>
  </g>

  <!-- small radiant cross above halo, echoing site iconography -->
  <g transform="translate(200,40)" opacity="0.85">
    <line x1="0" y1="-18" x2="0" y2="18" stroke="#C9A84C" stroke-width="3" stroke-linecap="round"/>
    <line x1="-12" y1="-6" x2="12" y2="-6" stroke="#C9A84C" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
